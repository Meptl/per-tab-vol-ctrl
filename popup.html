<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>per-tab-vol-ctrl</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="app">
      <h1>per-tab-vol-ctrl</h1>

      <form id="add-rule-form" class="add-rule-form">
        <label for="pattern-input">Domain pattern</label>
        <div class="input-row">
          <input id="pattern-input" name="pattern" type="text" required placeholder="*://example.com/*" />
          <button type="submit">+</button>
        </div>
      </form>

      <p id="status" class="status" role="status" aria-live="polite"></p>

      <section>
        <ul id="rules-list" class="rules-list"></ul>
      </section>
    </main>

    <script src="matcher.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
