<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>per-tab-vol-ctrl</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="app">
      <h1>per-tab-vol-ctrl</h1>

      <section class="tab-override">
        <h2>Tab Volume</h2>
        <p id="tab-label" class="tab-label"></p>
        <div class="tab-controls">
          <button id="tab-mute-btn" type="button">Mute</button>
          <input id="tab-volume-slider" type="range" min="0" max="100" step="1" />
          <output id="tab-volume-value" class="volume-value">100%</output>
          <button id="tab-clear-btn" type="button">Clear</button>
        </div>
        <p id="tab-state" class="hint"></p>
      </section>

      <form id="add-rule-form" class="add-rule-form">
        <label for="pattern-input">Domain pattern</label>
        <div class="input-row">
          <input id="pattern-input" name="pattern" type="text" required placeholder="*://example.com/*" />
          <button type="submit" aria-label="Add rule">
            <svg
              class="icon"
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              aria-hidden="true"
            >
              <path d="M12 5l0 14" />
              <path d="M5 12l14 0" />
            </svg>
          </button>
        </div>
      </form>

      <p id="status" class="status" role="status" aria-live="polite"></p>

      <section>
        <ul id="rules-list" class="rules-list"></ul>
      </section>
    </main>

    <script src="matcher.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
